name: Certiaura Repository Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm repository structure
        run: |
          echo "Checking Certiaura repository structure..."
          test -d "00_Governance"
          test -d "01_Knowledge_Systems"
          test -d "02_Peptides"
          test -d "03_Biology"
          test -d "04_Conditions"
          test -d "05_Monitoring"
          test -d "06_Evidence"
          test -d "07_Goals"
          test -d "Documentation"
          echo "Repository structure OK."

      - name: Confirm core documents exist
        run: |
          echo "Checking core Certiaura files..."
          test -f "README.md"
          test -f "00_Governance/Governance_Continuity_Standard.md"
          test -f "00_Governance/Universal_Asset_Relationship_Standard_UARS.md"
          test -f "Documentation/Master_Asset_Register.csv"
          test -f "Documentation/CHANGELOG.md"
          echo "Core documents OK."

      - name: Check for duplicate asset IDs in Markdown files
        run: |
          echo "Checking for duplicate CERT asset IDs..."
          grep -rhoE 'CERT-[A-Z]{3}-[0-9]{6}' . --include='*.md' | sort > asset_ids.txt || true
          if [ -s asset_ids.txt ]; then
            duplicates=$(uniq -d asset_ids.txt)
            if [ -n "$duplicates" ]; then
              echo "Duplicate asset IDs found:"
              echo "$duplicates"
              exit 1
            fi
          fi
          echo "No duplicate asset IDs found."
